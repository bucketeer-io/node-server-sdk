name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: 20      

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup node env
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      # Pinned to 11.10.0 to avoid a self-upgrade crash on the GitHub-hosted runner
      # image (npm 10.9.7 + npm >= 11.12.0 hits MODULE_NOT_FOUND: promise-retry).
      # See https://github.com/actions/runner-images/issues/13883
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@11.10.0

      - name: Install dependencies
        run: make init

      - name: Build SDK
        run: make build

      - name: Publish to npm via OIDC
        run: |
          make copy-genfiles
          npm publish \
            --provenance \
            --access public \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Dispatch dependency bump to openfeature-node-server-sdk
        # Only dispatch on real tag pushes (not dry-run workflow_dispatch).
        if: ${{ !inputs.dry_run && startsWith(github.ref, 'refs/tags/v') }}
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
        with:
          repo: bucketeer-io/openfeature-node-server-sdk
          token: ${{ secrets.REPO_ACCESS_PAT }}
          workflow: bump-node-server-sdk.yml
          ref: main
          inputs: '{"version": "${{ github.ref_name }}"}'
